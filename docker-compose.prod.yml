version: '3.8'

services:
  # ── PostgreSQL Database ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: unione_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-unione_production}
      POSTGRES_USER: ${DB_USER:-unione}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-unione_secure_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - unione_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-unione}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # ── Redis Cache & Queue ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: unione_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_password} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - unione_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ── Node.js API Server ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: unione_api
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-unione_production}
      DB_USER: ${DB_USER:-unione}
      DB_PASSWORD: ${DB_PASSWORD:-unione_secure_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - unione_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ── Queue Worker ──────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: unione_worker
    command: node src/workers/queueWorker.js
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-unione_production}
      DB_USER: ${DB_USER:-unione}
      DB_PASSWORD: ${DB_PASSWORD:-unione_secure_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./logs:/app/logs
    networks:
      - unione_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ── Nginx Reverse Proxy (Optional) ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: unione_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - unione_network
    depends_on:
      - api
    restart: unless-stopped
    profiles:
      - nginx

  # ── Database Backup Service ───────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: unione_backup
    volumes:
      - ./backups:/backups
    networks:
      - unione_network
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-unione_secure_password}
    entrypoint: |
      bash -c '
        while true; do
          pg_dump -h postgres -U ${DB_USER:-unione} ${DB_NAME:-unione_production} > /backups/backup-$$(date +%Y%m%d_%H%M%S).sql
          find /backups -name "*.sql" -mtime +7 -delete
          sleep 86400
        done
      '
    restart: unless-stopped
    profiles:
      - backup

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  unione_network:
    driver: bridge
